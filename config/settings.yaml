# ============================================================
# WorkfloAgent - 全局配置
# ============================================================

app_name: "WorkfloAgent"
version: "1.0.0"
log_level: "INFO"
prompts_dir: "prompts"

# ---------- LLM 配置 ----------
llm:
  provider: "openai"
  model: "deepseek-chat"
  api_key: ""
  base_url: "https://api.deepseek.com/v1"
  temperature: 0.3
  max_tokens: 4096
  timeout: 120

# ---------- Agent 配置 ----------
agent:
  use_langgraph: false
  max_tool_rounds: 5
  rag_top_k: 5
  memory_window_size: 10

# ---------- RAG 配置 ----------
rag:
  enabled: false
  embedding_provider: "dashscope"
  embedding_model: "text-embedding-v3"
  top_k: 5
  qdrant_host: "localhost"
  qdrant_port: 6333

# ---------- Cross-encoder 配置 ----------
cross_encoder:
  enabled: false
  mode: "llm"
  model_name: ""

# ---------- Embedding 配置 ----------
embedding:
  provider: "dashscope"
  model: "text-embedding-v2"
  api_key: ""

# ---------- 监控配置 ----------
monitoring:
  prometheus_enabled: true
  trace_enabled: true
  trace_file: "traces/agent_runs.jsonl"

# ---------- 存储配置 ----------
storage:
  database_url: "sqlite:///data/ticket_agent.db"
  upload_dir: "uploads"
  max_upload_size: 20971520

# ---------- Memory 配置 ----------
memory:
  backend: "local"
  max_history: 20

# ---------- Server 配置 ----------
server:
  host: "0.0.0.0"
  port: 8000
  debug: false
  cors_origins:
    - "*"
