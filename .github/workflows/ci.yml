name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 mypy

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --max-line-length=140

      - name: Type check with mypy
        run: |
          mypy . --ignore-missing-imports || true

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Test with pytest (coverage)
        run: |
          python -m pytest tests/ -v --tb=short --cov=. --cov-report=term --cov-report=html --cov-fail-under=40
        env:
          AGENT_TRACE_ENABLED: "false"
          LLM_API_KEY: "test-skip"
          QDRANT_ENABLED: "false"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: htmlcov/

      - name: Test import integrity
        run: |
          python -c "
          import ast, sys, os
          errors = []
          for root, dirs, files in os.walk('.'):
              if '.git' in root or '__pycache__' in root or '.pytest_cache' in root or 'data' in root or 'v' in root:
                  continue
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      try:
                          with open(path, 'r', encoding='utf-8') as fh:
                              ast.parse(fh.read())
                      except SyntaxError as e:
                          errors.append((path, str(e)))
          if errors:
              for p, e in errors:
                  print(f'SYNTAX ERROR: {p}: {e}')
              sys.exit(1)
          print('All Python files pass syntax check')
          "

  docker:
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t ticket-agent:latest -f ticket_agent/Dockerfile .
